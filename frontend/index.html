<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talisay Heat Monitor</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #121212;
        color: white;
        padding: 20px;
      }
      .container {
        max-width: 900px;
        margin: auto;
      }
      h1 {
        color: #ff4757;
        text-align: center;
      }

      button {
        background: #2ed573;
        border: none;
        padding: 10px 20px;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background: #7bed9f;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: #1e1e1e;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #333;
      }
      th {
        background: #2f3542;
        color: #ffa502;
      }

      .heat-tag {
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: bold;
        font-size: 0.8em;
      }
      .danger {
        background: #ff4757;
        color: white;
      }
      .caution {
        background: #ffa502;
        color: black;
      }
      .normal {
        background: #2ed573;
        color: white;
      }

      #loading {
        display: none;
        color: #70a1ff;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📍 Talisay Heat History</h1>
      <button onclick="renderHistory()">🔄 Refresh Data</button>
      <span id="loading"> Fetching from tunnel...</span>

      <table id="historyTable">
        <thead>
          <tr>
            <th>Barangay</th>
            <th>Temp (°C)</th>
            <th>Date</th>
            <th>Time</th>
            <th>Coordinates</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <script>
      const apiURL =
        "https://3h48gqgv-5000.asse.devtunnels.ms/api/heat-history";

      async function getHeatHistory() {
        const loader = document.getElementById("loading");
        loader.style.display = "inline";

        try {
          const response = await fetch(apiURL, {
            method: "GET",
            headers: {
              "X-API-KEY": "h43dsHfjKS956032b8a9e5c1f0e4b",
              "X-Tunnel-Skip-AntiPhishing-Page": "true",
              Accept: "application/json",
            },
          });

          if (!response.ok)
            throw new Error(`Bouncer says no! Status: ${response.status}`);

          const data = await response.json();
          loader.style.display = "none";
          return data;
        } catch (error) {
          loader.innerText = " ❌ Connection failed. Check Console.";
          console.error("Connection failed:", error);
        }
      }

      async function renderHistory() {
        const data = await getHeatHistory();
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = ""; // Clear old data

        if (!data) return;

        data.forEach((item) => {
          // Innovative: Add a color class based on heat index
          let statusClass = "normal";
          if (item.heatIndex >= 42) statusClass = "danger";
          else if (item.heatIndex >= 39) statusClass = "caution";

          const row = `
                    <tr>
                        <td><strong>${item.barangayName}</strong></td>
                        <td><span class="heat-tag ${statusClass}">${item.heatIndex}°C</span></td>
                        <td>${item.date}</td>
                        <td>${item.time}</td>
                        <td style="font-size: 0.8em; color: #888;">${item.lat}, ${item.lng}</td>
                    </tr>
                `;
          tableBody.innerHTML += row;
        });
      }

      // Auto-load on startup
      renderHistory();
    </script>
  </body>
</html>
